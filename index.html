<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinhHa | Game Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 50px; }
        #game-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1000px; width: 100%; }
        .card { background: white; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card h3 { margin-bottom: 10px; text-transform: capitalize; }
        .card p { color: #64748b; font-size: 0.9rem; flex-grow: 1; margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; text-decoration: none; padding: 10px; border-radius: 8px; text-align: center; font-weight: 600; }
        .loading { font-style: italic; color: #94a3b8; }
    </style>
</head>
<body>

    <header>
        <h1>DinhHa's Game Studio</h1>
        <p>Danh sách game tự động cập nhật từ GitHub</p>
    </header>

    <div id="game-container">
        <p class="loading">Đang tải danh sách game...</p>
    </div>

    <script>
        const username = 'dinhha125189';
        const container = document.getElementById('game-container');

        async function fetchGames() {
            try {
                // Gọi API lấy danh sách Repo
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
                const repos = await response.json();

                container.innerHTML = ''; // Xóa dòng chữ "Đang tải"

                repos.forEach(repo => {
                    // Chỉ hiển thị nếu có GitHub Pages và không phải là trang Profile chính
                    // Bạn có thể thêm điều kiện: if (repo.name.includes('Game')) để lọc kỹ hơn
                    if (repo.has_pages && repo.name !== `${username}.github.io`) {
                        const card = `
                            <div class="card">
                                <h3>🎮 ${repo.name.replace(/-/g, ' ')}</h3>
                                <p>${repo.description || 'Không có mô tả cho game này.'}</p>
                                <a href="https://${username}.github.io/${repo.name}/" class="btn">Chơi ngay</a>
                            </div>
                        `;
                        container.innerHTML += card;
                    }
                });
            } catch (error) {
                container.innerHTML = '<p>Không thể tải danh sách game lúc này.</p>';
            }
        }

        fetchGames();
    </script>
</body>
</html>
